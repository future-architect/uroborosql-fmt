name: Release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    runs-on: ubuntu-latest
    # fork からの実行を防止
    if: github.repository == 'future-architect/uroborosql-fmt'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # RELEASE_PLZ_TOKEN (PAT) が必須。
          # デフォルトの GITHUB_TOKEN で作成したタグは他のワークフロー (on: push: tags) を
          # トリガーしないため、PAT を使用する必要がある。
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          # release ステップは workspace 内 path 依存があると cargo publish を試行して失敗する
          # 既知バグ (https://github.com/release-plz/release-plz/issues/2595) のワークアラウンドとして
          # release-pr のみ実行する。タグ・GitHub Release の作成は当面手動で行う。
          # 根本fix の PR (https://github.com/release-plz/release-plz/pull/2789) が
          # マージされたら command を外して自動化に戻す。
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
