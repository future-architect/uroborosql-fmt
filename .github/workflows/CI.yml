name: Build and Deploy
env:
  DEBUG: napi:*
  APP_NAME: uroborosql-fmt-napi
  WORKING_DIR: crates/uroborosql-fmt-napi
  MACOSX_DEPLOYMENT_TARGET: "10.13"
permissions:
  contents: write
  id-token: write
"on":
  push:
    branches: [main]
    tags:
      - "uroborosql-fmt-v*"
      - "uroborosql-fmt-cli-v*"
      - "uroborosql-fmt-napi-v*"
      - "uroborosql-fmt-wasm-v*"
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
  pull_request: null
  workflow_dispatch: null
jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit
  build-napi:
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') || startsWith(github.ref_name, 'uroborosql-fmt-napi-v') }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-15-intel
            target: x86_64-apple-darwin
            build: |
              yarn build
              strip -x *.node
          - host: windows-latest
            build: |
              git config --system core.longpaths true 
              yarn build
            target: x86_64-pc-windows-msvc
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              yarn build --target aarch64-apple-darwin
              strip -x *.node
          - host: windows-latest
            build: |
              git config --system core.longpaths true
              yarn build --target aarch64-pc-windows-msvc
            target: aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |-
              rustup install 1.88.0 &&
              rustup default 1.88.0 &&
              set -e &&
              yarn build --target x86_64-unknown-linux-gnu &&
              strip *.node
          # TODO: support for aarch64-unknown-linux-gnu
          # - host: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          #   build: |-
          #     set -e &&
          #     yarn build --target aarch64-unknown-linux-gnu &&
          #     aarch64-unknown-linux-gnu-strip *.node

    name: stable - ${{ matrix.settings.target }} - node@24
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: ./crates/uroborosql-fmt-napi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 24
          check-latest: true
          cache: yarn
          cache-dependency-path: ./${{ env.WORKING_DIR }}/yarn.lock
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        if: ${{ matrix.settings.target == 'armv7-unknown-linux-gnueabihf' }}
        with:
          version: 0.10.1
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Setup node x86
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        run: yarn config set supportedArchitectures.cpu "ia32"
        shell: bash
      - name: Install dependencies
        run: yarn install
      - name: Setup node x86
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 24
          check-latest: true
          cache: yarn
          cache-dependency-path: ./${{ env.WORKING_DIR }}/yarn.lock
          architecture: x86
      - name: Build in docker
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185 # v3
        if: ${{ matrix.settings.docker }}
        with:
          image: ${{ matrix.settings.docker }}
          options: "--user 0:0 -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index -v ${{ github.workspace }}:/build -w /build/${{ env.WORKING_DIR }}"
          run: ${{ matrix.settings.build }}
      - name: Build
        run: ${{ matrix.settings.build }}
        if: ${{ !matrix.settings.docker }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.WORKING_DIR }}/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-failure-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure

  # CLI バイナリ (uroborosql-fmt) を各プラットフォーム向けにビルド
  build-cli:
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') || startsWith(github.ref_name, 'uroborosql-fmt-cli-v') }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-15-intel
            target: x86_64-apple-darwin
            asset: uroborosql-fmt-x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            asset: uroborosql-fmt-aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            asset: uroborosql-fmt-x86_64-pc-windows-msvc.exe
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            asset: uroborosql-fmt-aarch64-pc-windows-msvc.exe
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: uroborosql-fmt-x86_64-unknown-linux-gnu
    name: build-cli - ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.target }}-cargo-cli-${{ matrix.host }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p uroborosql-fmt-cli
        shell: bash
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p cli-dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/uroborosql-fmt.exe" "cli-dist/${{ matrix.asset }}"
          else
            cp "target/${{ matrix.target }}/release/uroborosql-fmt" "cli-dist/${{ matrix.asset }}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: cli-dist/${{ matrix.asset }}
          if-no-files-found: error

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-failure-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure

  build-wasm:
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') || startsWith(github.ref_name, 'uroborosql-fmt-wasm-v') }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup cargo
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Setup wasm-pack
        uses: taiki-e/install-action@e0eafa9a0d485c37f97c0f7beb930a58a2facbac # v2.79.4
        with:
          tool: wasm-pack

      - name: Build
        run: wasm-pack build --target web
        working-directory: crates/uroborosql-fmt-wasm

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wasm-and-js
          path: |
            crates/uroborosql-fmt-wasm/pkg/uroborosql_fmt_wasm.js
            crates/uroborosql-fmt-wasm/pkg/uroborosql_fmt_wasm_bg.wasm
          if-no-files-found: error

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-failure-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # NAPI バイナリを npm pack して GitHub Release のアセットにアップロード
  upload-napi-to-release:
    if: github.repository == 'future-architect/uroborosql-fmt' &&
      startsWith(github.ref_name, 'uroborosql-fmt-napi-v')
    needs: build-napi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          check-latest: true
          cache: yarn
          cache-dependency-path: ./${{ env.WORKING_DIR }}/yarn.lock
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: yarn install

      # タグからバージョンを取得し、NAPI の package.json を同期する
      # npm pack がタグと一致するファイル名（例: uroborosql-fmt-napi-1.0.2.tgz）を生成するために必要
      - name: Sync NAPI package.json version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#uroborosql-fmt-napi-v}
          echo "Syncing NAPI package.json version to ${VERSION}"
          jq --arg v "$VERSION" '.version = $v' ${{ env.WORKING_DIR }}/package.json > tmp.json
          mv tmp.json ${{ env.WORKING_DIR }}/package.json

      # *.node のダウンロード
      - name: Download .node file for aarch64-apple-darwin
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-aarch64-apple-darwin
          path: ./${{ env.WORKING_DIR }}
      - name: Download .node file for x86_64-apple-darwin
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-x86_64-apple-darwin
          path: ./${{ env.WORKING_DIR }}
      - name: Download .node file for aarch64_pc_windows_msvc
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-aarch64-pc-windows-msvc
          path: ./${{ env.WORKING_DIR }}
      - name: Download .node file for x86_64_pc_windows_msvc
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-x86_64-pc-windows-msvc
          path: ./${{ env.WORKING_DIR }}
      - name: Download .node file for x86_64_unknown-linux-gnu
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: ./${{ env.WORKING_DIR }}

      - name: Package
        run: |
          cd ${{ env.WORKING_DIR }}
          mkdir -p repo
          cp index.js repo/index.js
          cp index.d.ts repo/index.d.ts
          cp package.json repo/package.json
          mv *.node repo
          cd repo
          npm pack

      - name: Upload .tgz to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" ${{ env.WORKING_DIR }}/repo/*.tgz --clobber

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-failure-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure

  # CLI バイナリを GitHub Release のアセットにアップロード
  upload-cli-to-release:
    if: github.repository == 'future-architect/uroborosql-fmt' &&
      startsWith(github.ref_name, 'uroborosql-fmt-cli-v')
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: ./cli-artifacts
          merge-multiple: true
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" ./cli-artifacts/* --clobber

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-failure-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure

  # WASM デモページを GitHub Pages にデプロイ
  deploy-wasm-to-gh-pages:
    if: github.repository == 'future-architect/uroborosql-fmt' &&
      startsWith(github.ref_name, 'uroborosql-fmt-wasm-v')
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download wasm
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-and-js
          path: ./wasm

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./wasm
          force_orphan: true

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-failure-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
